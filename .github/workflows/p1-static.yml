name: P1 static validation

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  python:
    name: P1 Python validation
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install locked development dependencies
        run: python -m pip install -r requirements-dev.lock -e .
      - name: Run contract and API tests
        run: python -m pytest
      - name: Lint and type-check Python
        run: |
          python -m ruff check packages services tests
          python -m mypy

  web:
    name: P1 web validation
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
      - name: Install locked web dependencies
        run: pnpm install --frozen-lockfile
      - name: Type-check and test web client
        run: |
          pnpm typecheck
          pnpm test:web
      - name: Build web client
        run: pnpm --filter @asklily/web build
